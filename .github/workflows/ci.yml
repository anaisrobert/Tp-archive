name: CI Flask App

on:
  pull_request:
    branches: [ "dev" ]  # Se déclenche sur les PR vers la branche dev

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest flask
          
      - name: Run Ruff
        run: ruff check .
        
      - name: Run Tests
        run: python -m pytest
